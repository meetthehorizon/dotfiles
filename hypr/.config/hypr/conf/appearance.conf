general {
    gaps_in = 4            # Space between tiled windows (tight but visible)
    gaps_out = 8           # Outer gap from screen edge (gives padding to layout)
    border_size = 2        # Window border thickness

    col.active_border = rgb(94e2d5)   # Active window border color (teal accent)
    col.inactive_border = rgb(2a2a3a) # Inactive window border (dark, low contrast)

    resize_on_border = false  # Disable drag-resize via borders (avoids accidental resizes)
    allow_tearing = false     # Prevent screen tearing (keep off unless gaming fullscreen)

    layout = dwindle          # Default tiling layout (spiral-style dynamic tiling)
}

decoration {
    rounding = 5          # Corner radius (subtle rounding, not too “floaty”)
    rounding_power = 2    # Controls curvature sharpness (higher = tighter curve)

    active_opacity = 1.0    # Fully opaque active windows
    inactive_opacity = 1.0  # No dimming for inactive (clean but less focus separation)

    blur {
        enabled = true        # Enable blur for transparent surfaces (rofi, terminals, etc.)
        size = 7              # Blur radius (higher = heavier GPU cost)
        passes = 3            # Number of blur passes (main performance killer)

        new_optimizations = true  # Use improved blur pipeline (keep this ON)

        noise = 0.02          # Grain to reduce banding (subtle, don’t increase much)
        contrast = 1.0        # Keep original contrast
        brightness = 0.7      # Slightly darkens blurred background (good for readability)

        xray = true           # Blur ignores window content order → more consistent visuals
    }
}

misc {
    force_default_wallpaper = -1  # Disable Hyprland default wallpaper completely
    disable_hyprland_logo = false # Keep/remove Hyprland logo on empty workspace
    focus_on_activate = true      # Auto-focus windows when they request attention (sane default)
}
