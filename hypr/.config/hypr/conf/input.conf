input {
    kb_layout = us        # Keyboard layout (US standard)
    kb_variant =          # Empty → default variant
    kb_model =            # Empty → auto-detect
    kb_rules =            # Usually left empty unless doing advanced remaps

    kb_options = caps:swapescape  # Swap Caps Lock ↔ Escape (vim-friendly)

    follow_mouse = 1      # Focus follows mouse hover (no click needed)

    sensitivity = 0       # Mouse sensitivity (0 = neutral, no scaling)

    touchpad {
        natural_scroll = true  # Mac-style scrolling (content follows fingers)
    }
}

# =========================
# Gestures
# =========================
gesture = 3, horizontal, workspace  # 3-finger horizontal swipe → switch workspaces
