# =========================
# Cursor / UI scaling
# =========================
env = XCURSOR_SIZE,24        # Cursor size for X11 apps
env = HYPRCURSOR_SIZE,24     # Cursor size for Hyprland/Wayland

# =========================
# Wayland compatibility (forces apps to prefer Wayland)
# =========================
env = ELECTRON_OZONE_PLATFORM_HINT,wayland   # Electron apps (VSCode, Discord, etc.)
env = GDK_BACKEND,wayland,x11,*              # GTK apps prefer Wayland, fallback to X11
env = QT_QPA_PLATFORM,wayland;xcb            # Qt apps prefer Wayland, fallback to X11
env = SDL_VIDEODRIVER,wayland                # SDL apps (games, emulators)
env = CLUTTER_BACKEND,wayland                # GNOME-based apps (rare but safe)

# =========================
# XDG session identity (important for portals, theming, etc.)
# =========================
env = XDG_CONFIG_HOME,$HOME/.config          # Config directory
env = XDG_CURRENT_DESKTOP,Hyprland           # Identify desktop environment
env = XDG_SESSION_TYPE,wayland               # Force Wayland session
env = XDG_SESSION_DESKTOP,Hyprland           # Used by some apps/portals

# =========================
# Qt theming & behavior
# =========================
env = QT_AUTO_SCREEN_SCALE_FACTOR,1          # Enable automatic scaling for HiDPI
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # Use Hyprland borders instead of Qt ones
env = QT_QPA_PLATFORMTHEME,qt6ct             # Use qt6ct for Qt theming

# =========================
# GPU / video acceleration (NVIDIA-specific)
# =========================
env = LIBVA_DRIVER_NAME,nvidia               # VA-API driver (video decode)
env = __GLX_VENDOR_LIBRARY_NAME,nvidia       # Ensure NVIDIA GLX is used
env = NVD_BACKEND,direct                     # Direct backend (Wayland optimization)

# =========================
# Custom PATH additions
# =========================
env = PATH,$HOME/.ghcup/bin:$PATH            # Add GHCup (Haskell toolchain) to PATH
