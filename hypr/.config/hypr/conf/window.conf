# =========================
# Layer rules (blur + transparency handling)
# =========================
layerrule = blur on, match:namespace ^rofi$         # Blur behind rofi launcher
layerrule = blur on, match:namespace ^waybar-top$   # Blur behind top bar
layerrule = blur on, match:namespace ^wlogout$      # Blur logout menu

layerrule = ignore_alpha 0, match:namespace ^rofi$        # Respect transparency (no forced opacity)
layerrule = ignore_alpha 0, match:namespace ^waybar-top$  # Same for waybar
layerrule = ignore_alpha 0, match:namespace ^wlogout$     # Same for wlogout

# =========================
# Floating utility windows
# =========================
windowrule {
    name = float for apps   # Debug label (only for your reference)

    match:class = ^(.*wezterm|rog-control-center)$   # Terminal + ASUS control center
    match:title = ^(nmtui|gdu|bluetuith|Yazi.*|ROG.*)$  # CLI tools / TUI apps

    float = on               # Force floating
    move = 100 100           # Spawn position (top-left offset)
    size = 1200 800          # Default floating size
}

# =========================
# Specific override (ROG control center)
# =========================
windowrule {
    name = size for rog-control-center

    match:class = ^rog-control-center$  # Exact match (cleaner regex)

    size = 1355 993    # Custom fixed size (UI fits better)
}
