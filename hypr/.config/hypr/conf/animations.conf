animations {
    enabled = yes   # Master toggle for all animations (turn off for max performance)

    # --- Custom easing curves (controls feel, not speed) ---
    bezier = snap,      0.20, 1.00, 0.30, 1.00   # Fast snap with strong ease-out (primary curve)
    bezier = hardOut,   0.00, 0.90, 0.20, 1.00   # Aggressive exit (used for closing animations)
    bezier = microFade, 0.40, 0.00, 0.60, 1.00   # Subtle smooth fade (no noticeable lag)

    # --- Global pacing baseline ---
    animation = global,        1, 8,   snap      # Default fallback for anything unspecified

    # --- Window animations ---
    animation = windows,       1, 5,   snap      # General window movement/resizing
    animation = windowsIn,     1, 3,   snap,     popin 88%   # New windows pop in slightly scaled
    animation = windowsOut,    1, 2,   hardOut,  popin 88%   # Fast exit with slight shrink

    # --- Borders ---
    animation = border,        1, 4,   snap      # Border transitions (focus change, etc.)

    # --- Fading (kept short to avoid sluggish feel) ---
    animation = fade,          1, 2,   microFade # Default fade
    animation = fadeIn,        1, 2,   microFade # Fast fade-in
    animation = fadeOut,       1, 1.5, linear    # Instant-ish fade-out (no easing = snappier)

    # --- Layers (rofi, wlogout, notifications, overlays) ---
    animation = layers,        1, 4,   snap
    animation = layersIn,      1, 3,   snap,     fade   # Fade + slight motion
    animation = layersOut,     1, 2,   hardOut,  fade   # Fast dismiss
    animation = fadeLayersIn,  1, 2,   microFade
    animation = fadeLayersOut, 1, 1.5, linear

    # --- Workspace transitions (main visual identity) ---
    animation = workspaces,    1, 3,   snap,     slide  # Sliding between workspaces
    animation = workspacesIn,  1, 2,   snap,     slide  # Entering workspace
    animation = workspacesOut, 1, 2,   hardOut,  slide  # Leaving workspace quickly

    # --- Zoom (rarely used, but kept consistent) ---
    animation = zoomFactor,    1, 6,   snap      # Used for gestures / zoom effects
}

dwindle {
    pseudotile = true      # Allows floating-sized windows inside tiling layout (toggle with mod+P)
    preserve_split = true  # Keeps split ratios stable when adding/removing windows (prevents layout jumps)
}

master {
    new_status = master    # New windows open as master instead of slave (focus-first workflow)
}
