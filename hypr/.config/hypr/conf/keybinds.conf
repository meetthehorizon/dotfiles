$mainMod = SUPER # Use Windows key as main modifier

# --- Core app controls ---
bind = $mainMod, Q, exec, $terminal        # Open terminal
bind = $mainMod, C, killactive,            # Kill focused window
bind = $mainMod, Z, exec, pkill -x wlogout || wlogout  # Toggle logout menu
bind = $mainMod, E, exec, $fileManager     # Open file manager
bind = $mainMod, V, togglefloating,        # Toggle floating mode
bind = $mainMod, SPACE, exec, $menu        # App launcher (rofi/wofi)
bind = $mainMod, P, pseudo,                # Toggle pseudo tiling (dwindle)

# --- Focus movement (vim-style) ---
bind = $mainMod, h, movefocus, l           # Focus left
bind = $mainMod, l, movefocus, r           # Focus right
bind = $mainMod, k, movefocus, u           # Focus up
bind = $mainMod, j, movefocus, d           # Focus down

# --- Workspace switching ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10          # Jump to workspace

# --- Move window to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10  # Send window to workspace

# --- Workspace cycling ---
bind = $mainMod, mouse_down, workspace, e+1   # Next workspace (scroll down)
bind = $mainMod, mouse_up, workspace, e-1     # Previous workspace (scroll up)

# --- Mouse window control ---
bindm = $mainMod, mouse:272, movewindow       # Drag window (LMB)
bindm = $mainMod, mouse:273, resizewindow     # Resize window (RMB)

# --- Volume & audio ---
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower 
bindel = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Brightness ---
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise --device amdgpu_bl2
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower --device amdgpu_bl2

# --- Keyboard backlight ---
bindel = ,XF86KbdBrightnessDown, exec, $kbdBright lower
bindel = ,XF86KbdBrightnessUp, exec, $kbdBright higher

# --- Special hardware keys (ASUS specific mostly) ---
bindel = ,XF86Launch1, exec, rog-control-center              # ASUS control center
bindel = ,XF86Launch4, exec, "$HOME/.config/hypr/scripts/cycle-profile.sh"  # Power/performance profile toggle
bindel = ,XF86Explorer, exec, thunar                         # File manager shortcut
bindel = ,XF86Calculator, exec, qalculate-gtk                # Calculator
bindel = ,XF86Mail, exec, qalculate-gtk                      # Reused key → calculator
bindel = ,XF86Tools, exec, wezterm                           # Open terminal
bindel = ,XF86TouchpadToggle, exec, $touchpadToggle          # Toggle touchpad

# --- Media controls ---
bind = , XF86AudioPlay, exec, swayosd-client --playerctl=play-pause
bind = , XF86AudioNext, exec, swayosd-client --playerctl=next
bind = , XF86AudioPrev, exec, swayosd-client --playerctl=prev
bind = , XF86AudioStop, exec, swayosd-client --playerctl=stop

# --- Screenshots ---
bind = $SUPER_SHIFT, S, exec, hyprshot -m window -o Pictures/screen   # Screenshot focused window
bind = $mainMod, S, exec, hyprshot -m region -o Pictures/screen       # Screenshot region

# --- System / UI ---
bind = $SUPER_SHIFT, l, exec, hyprlock        # Lock screen
bind = $mainMod, W, exec, $switchWall         # Change wallpaper
bind = $mainMod, F, fullscreen, 1             # Toggle fullscreen

# --- Power user stuff ---
bind = SUPER, I, exec, wezterm start --always-new-process fish -l -c nvim  # Open fresh nvim session
bind = $mainMod, A, exec, pavucontrol            # Audio control panel
bind = $mainMod, N, exec, pkill -x hyprsunset || hyprsunset  # Toggle blue light filter

# --- Clipboard manager ---
bind = SUPER_SHIFT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/glass.rasi -theme-str 'listview { columns: 1; }' | cliphist decode | wl-copy
# Show clipboard history → pick via rofi → copy selection back
