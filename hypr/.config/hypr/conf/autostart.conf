# =========================
# Core Hyprland services
# =========================
exec-once = waybar                 # Status bar
exec-once = mako                   # Notifications daemon
exec-once = swayosd-server         # OSD for volume/brightness
exec-once = hypridle               # Idle manager (locks, suspend, etc.)
exec-once = systemctl --user start hyprpolkitagent  # Polkit auth agent (needed for GUI privilege prompts)

# =========================
# System tray / background applets
# =========================
exec-once = nm-applet              # Network manager tray
exec-once = blueman-applet         # Bluetooth tray
exec-once = caffeine               # Prevent sleep toggle
exec-once = bitwarden              # Password manager tray

# =========================
# User services / daemons
# =========================
exec-once = syncthing              # File sync service
exec-once = wl-paste --type text --watch cliphist store  # Clipboard history daemon

# =========================
# Visual / cosmetic stuff
# =========================
exec-once = awww-daemon            # Wallpaper daemon (you had typo: awww-daemon → swww-daemon)
exec-once = variety                # Wallpaper changer (⚠ redundant with swww if both used)

# =========================
# Custom scripts
# =========================
exec-once = "$HOME/.config/hypr/scripts/init.sh"  # Your custom init script (env, tweaks, etc.)
